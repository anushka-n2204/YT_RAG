<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | YouTube RAG Assistant</title>

    <link rel="stylesheet" href="css/login.css  ">

</head>

<body>

    <div class="container">

        <div class="register-box">

            <h1>YouTube RAG</h1>

            <p class="subtitle">

                Create your account

            </p>


            <!-- Name -->

            <div class="input-group">

                <label>Name</label>

                <input

                    type="text"

                    id="name"

                    placeholder="Enter your name"

                >

            </div>


            <!-- Email -->

            <div class="input-group">

                <label>Email</label>

                <input

                    type="email"

                    id="email"

                    placeholder="Enter your email"

                >

            </div>


            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input

                    type="password"

                    id="password"

                    placeholder="Create password"

                >

            </div>


            <!-- Confirm Password -->

            <div class="input-group">

                <label>Confirm Password</label>

                <input

                    type="password"

                    id="confirm_password"

                    placeholder="Confirm password"

                >

            </div>


            <button id="registerBtn">

                Create Account

            </button>


            <p id="message"></p>


            <div class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

        </div>

    </div>


    <script src="js/api.js"></script>

    <script src="js/register.js"></script>

</body>

</html>
