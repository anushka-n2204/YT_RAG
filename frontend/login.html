<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | YouTube RAG Assistant</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>YouTube RAG</h1>

            <p class="subtitle">

                Login to continue

            </p>


            <div class="input-group">

                <label>Email</label>

                <input

                    type="email"

                    id="email"

                    placeholder="Enter Email"

                >

            </div>


            <div class="input-group">

                <label>Password</label>

                <input

                    type="password"

                    id="password"

                    placeholder="Enter Password"

                >

            </div>


            <button id="loginBtn">

                Login

            </button>


            <p id="message"></p>


            <div class="register-link">

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </div>

        </div>

    </div>



    <!-- JavaScript -->

    <script src="js/api.js"></script>

    <script src="js/login.js"></script>

</body>

</html>
